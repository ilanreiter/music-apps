services:
  app:
    build: .
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    volumes:
      - ${MUSIC_LIBRARY_PATH:-./music}:/music:ro
      - artwork_cache:/app/artwork_cache
      - artist_cache:/app/artist_cache
    ports:
      - "8001:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "6009:80"
    depends_on:
      - app

volumes:
  artwork_cache:
  artist_cache: