server {
  listen 80;
  location / {
    root /usr/share/nginx/html;
    index index.html index.htm;
    try_files $uri $uri/ /index.html;
  }

  # Proxy API requests to the backend FastAPI service
  location /api/ {
    proxy_pass http://app:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

# HTTPS listener, self-signed - exists only because Spotify's OAuth
# redirect_uri must be https:// (or exactly http://localhost). Everyday
# traffic still uses the plain-HTTP server block above; this one is just for
# completing the Spotify Connect step in Settings.
server {
  listen 443 ssl;
  ssl_certificate /etc/nginx/certs/lan.crt;
  ssl_certificate_key /etc/nginx/certs/lan.key;

  location / {
    root /usr/share/nginx/html;
    index index.html index.htm;
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
    proxy_pass http://app:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
